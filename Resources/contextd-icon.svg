<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3a"/>
      <stop offset="100%" style="stop-color:#0d1229"/>
    </linearGradient>
    <!-- Cyan glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0"/>
    </radialGradient>
    <!-- Amber center glow -->
    <radialGradient id="amber-glow" cx="50%" cy="50%" r="8%">
      <stop offset="0%" style="stop-color:#ffb300;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ffb300;stop-opacity:0"/>
    </radialGradient>
    <!-- Drop shadow filter -->
    <filter id="node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="center-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- macOS squircle clip -->
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <!-- Clipped to macOS rounded rect -->
  <g clip-path="url(#squircle)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!-- Subtle radial glow behind graph -->
    <circle cx="512" cy="512" r="460" fill="url(#glow)"/>

    <!-- Graph edges (connections between nodes) -->
    <g stroke="#00bcd4" stroke-width="1.8" stroke-opacity="0.35" fill="none">
      <!-- Outer ring connections -->
      <line x1="512" y1="230" x2="720" y2="340"/>
      <line x1="720" y1="340" x2="760" y2="560"/>
      <line x1="760" y1="560" x2="650" y2="730"/>
      <line x1="650" y1="730" x2="420" y2="760"/>
      <line x1="420" y1="760" x2="280" y2="620"/>
      <line x1="280" y1="620" x2="270" y2="400"/>
      <line x1="270" y1="400" x2="512" y2="230"/>
      <!-- Inner connections to center -->
      <line x1="512" y1="512" x2="512" y2="230"/>
      <line x1="512" y1="512" x2="720" y2="340"/>
      <line x1="512" y1="512" x2="760" y2="560"/>
      <line x1="512" y1="512" x2="650" y2="730"/>
      <line x1="512" y1="512" x2="420" y2="760"/>
      <line x1="512" y1="512" x2="280" y2="620"/>
      <line x1="512" y1="512" x2="270" y2="400"/>
      <!-- Cross connections for depth -->
      <line x1="512" y1="230" x2="280" y2="620" stroke-opacity="0.15"/>
      <line x1="720" y1="340" x2="420" y2="760" stroke-opacity="0.15"/>
      <line x1="270" y1="400" x2="650" y2="730" stroke-opacity="0.15"/>
    </g>

    <!-- Stylized eye shape (two arcs forming an almond) -->
    <g fill="none" stroke="#00e5ff" stroke-width="2.5" stroke-opacity="0.5">
      <!-- Upper lid -->
      <path d="M 260 512 Q 512 300 764 512" />
      <!-- Lower lid -->
      <path d="M 260 512 Q 512 724 764 512" />
    </g>

    <!-- Inner eye circle (iris) -->
    <circle cx="512" cy="512" r="100" fill="none" stroke="#00e5ff" stroke-width="2" stroke-opacity="0.3"/>
    <circle cx="512" cy="512" r="60" fill="none" stroke="#00bcd4" stroke-width="1.5" stroke-opacity="0.2"/>

    <!-- Ambient glow behind center -->
    <circle cx="512" cy="512" r="80" fill="url(#amber-glow)"/>

    <!-- Center amber dot (the nexus / pupil) -->
    <circle cx="512" cy="512" r="24" fill="#ffb300" filter="url(#center-glow)"/>
    <circle cx="512" cy="512" r="14" fill="#ffe082"/>
    <circle cx="512" cy="512" r="6" fill="#fff8e1"/>

    <!-- Graph nodes (outer ring) -->
    <g filter="url(#node-glow)">
      <circle cx="512" cy="230" r="10" fill="#00e5ff"/>
      <circle cx="720" cy="340" r="8" fill="#00bcd4"/>
      <circle cx="760" cy="560" r="9" fill="#00e5ff"/>
      <circle cx="650" cy="730" r="7" fill="#00bcd4"/>
      <circle cx="420" cy="760" r="8" fill="#00e5ff"/>
      <circle cx="280" cy="620" r="9" fill="#00bcd4"/>
      <circle cx="270" cy="400" r="7" fill="#00e5ff"/>
    </g>

    <!-- Subtle inner highlight for depth (Big Sur glass effect) -->
    <rect width="1024" height="512" fill="url(#bg)" opacity="0" rx="224"/>
    <rect x="40" y="40" width="944" height="460" rx="200" fill="white" opacity="0.03"/>
  </g>
</svg>
